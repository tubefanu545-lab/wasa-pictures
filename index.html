<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasa Pictures</title>
    <style>
        :root { --primary-color: #00796b; --text-color: #222222; --border-color: rgba(255,255,255,0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        /* 📱 በስልክም በኮምፒውተርም ቪዲዮው ሳይቆረጥ መሃል ላይ ሙሉ ስክሪን እንዲሆን ማድረጊያ */
        body { color: var(--text-color); padding: 25px 15px; min-height: 100vh; position: relative; background: #e94b79; overflow-x: hidden; }
        .video-bg { position: fixed; top: 50%; left: 50%; min-width: 100vw; min-height: 100vh; width: auto; height: auto; object-fit: cover; z-index: -1; pointer-events: none; opacity: 0.85; transform: translate(-50%, -50%); }
        .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 15px 20px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid var(--border-color); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .hamburger-btn { background: none; border: none; font-size: 1.8rem; color: #ffffff; cursor: pointer; }
        h1 { font-size: 2.2rem; color: #ffffff; font-weight: 700; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .status-badge { display: flex; align-items: center; gap: 6px; font-weight: 600; padding: 6px 14px; border-radius: 20px; background: #ffffff; color: #2e7d32; font-size: 0.85rem; }
        .status-dot { width: 8px; height: 8px; background-color: #2e7d32; border-radius: 50%; box-shadow: 0 0 6px #2e7d32; }
        .open-booking-btn { background-color: #cc2b5e; color: white; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; border: none; font-size: 0.85rem; }
        .filter-container { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 5px; }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 0.9rem; white-space: nowrap; transition: 0.2s; backdrop-filter: blur(5px); }
        .filter-btn.active { background: #00695c; border-color: #00695c; }
        .gallery-panel h2 { margin-bottom: 20px; font-size: 1.4rem; display: flex; justify-content: space-between; align-items: center; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .photo-count { font-size: 0.85rem; color: #ffffff; background: #333333; padding: 4px 10px; border-radius: 8px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .photo-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 12px; }
        .photo-img-wrapper { width: 100%; height: 200px; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        .photo-info { padding: 10px 4px 4px 4px; display: flex; justify-content: space-between; align-items: center; }
        .photo-title { font-weight: 600; font-size: 1.05rem; color: #333; }
        .photo-tag { font-size: 0.75rem; color: #00796b; font-weight: 600; margin-top: 2px; }
        .delete-btn { background-color: #e53935; color: white; border: none; padding: 5px 12px; font-size: 0.8rem; border-radius: 6px; cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100%; background: #ffffff; box-shadow: 4px 0 15px rgba(0,0,0,0.2); z-index: 1000; transition: left 0.3s ease; padding: 25px; }
        .sidebar.open { left: 0; }
        .close-btn { float: right; background: none; border: none; font-size: 1.3rem; cursor: pointer; }
        .form-group { margin-top: 15px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        .overlay.show { display: block; }
        .image-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .image-modal.show { display: flex; }
        .modal-content { max-width: 90%; max-height: 85%; border-radius: 8px; }
    </style>
</head>
<body>

<video class="video-bg" autoplay loop muted playsinline>
    <source src="https://xubmrxlqtzglnnthvckr.supabase.co/storage/v1/object/public/videos/background.mp4" type="video/mp4">
</video>

<div id="sidebarOverlay" class="overlay" onclick="toggleMenu()"></div>
<div id="sidebarMenu" class="sidebar">
    <button class="close-btn" onclick="toggleMenu()">✕</button>
    <div style="margin-top: 40px;">
        <h2>Admin Panel</h2>
        <div class="form-group"><input type="password" id="passwordInput" placeholder="Password"></div>
        <div class="form-group"><input type="text" id="titleInput" placeholder="Title"></div>
        <div class="form-group"><select id="categoryInput"><option value="Wedding">Wedding</option><option value="Birth Day">Birth Day</option><option value="Kiristina">Kiristina</option></select></div>
        <div class="form-group"><input type="file" id="fileInput" accept="image/*"></div>
        <button id="uploadBtn" onclick="uploadPhoto()" style="width:100%; padding:12px; background:#00796b; color:white; border:none; border-radius:8px; margin-top:15px; font-weight:600; cursor:pointer;">Upload Photo</button>
    </div>
</div>

<div id="imageModal" class="image-modal" onclick="closeImage()"><img id="modalImg" class="modal-content" src=""></div>

<div class="container">
    <header>
        <div class="header-left"><button class="hamburger-btn" onclick="toggleMenu()">☰</button><h1>Wasa Pictures</h1></div>
        <div class="header-right">
            <button class="open-booking-btn">Book Now 📸</button>
            <div class="status-badge"><span class="status-dot"></span><span>Online</span></div>
        </div>
    </header>
    
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterGallery('All', this)">All</button>
        <button class="filter-btn" onclick="filterGallery('Wedding', this)">Wedding</button>
        <button class="filter-btn" onclick="filterGallery('Birth Day', this)">Birth Day</button>
        <button class="filter-btn" onclick="filterGallery('Kiristina', this)">Kiristina</button>
    </div>
    
    <div class="gallery-panel">
        <h2>Gallery Items <span id="photoCount" class="photo-count">0 items</span></h2>
        <div id="galleryGrid" class="gallery-grid"></div>
    </div>
</div>

<script>
    const API_BASE_URL = "https://wasa-pictures.onrender.com";
    let allPhotos = [];
    function toggleMenu() { document.getElementById('sidebarMenu').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); }
    function openImage(url) { document.getElementById('modalImg').src = url; document.getElementById('imageModal').classList.add('show'); }
    function closeImage() { document.getElementById('imageModal').classList.remove('show'); }
    
    async function loadPhotos() {
        try { 
            const res = await fetch(`${API_BASE_URL}/photos`, { mode: "cors" }); 
            allPhotos = await res.json(); 
            renderGallery(); 
        } catch (err) { console.error(err); }
    }
    function filterGallery(category, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(category === "All" ? allPhotos : allPhotos.filter(p => p.category === category));
    }
    function renderGallery(data = allPhotos) {
        const grid = document.getElementById('galleryGrid');
        document.getElementById('photoCount').innerText = `${data.length} items`;
        grid.innerHTML = "";
        if(data.length === 0) { grid.innerHTML = "<p style='color:white; text-align:center; grid-column:1/-1;'>No photos found.</p>"; return; }
        data.forEach(p => {
            const card = document.createElement('div'); card.className = 'photo-card';
            card.innerHTML = `
                <div class="photo-img-wrapper" onclick="openImage('${p.url}')"><img src="${p.url}"></div>
                <div class="photo-info">
                    <div><div class="photo-title">${p.title || 'Wedding photos'}</div><div class="photo-tag">${p.category}</div></div>
                    <button class="delete-btn" onclick="deletePhoto('${p.url}')">Delete</button>
                </div>`;
            grid.appendChild(card);
        });
    }
    
    async function uploadPhoto() {
        const password = document.getElementById('passwordInput').value, title = document.getElementById('titleInput').value.trim(), category = document.getElementById('categoryInput').value, fileInput = document.getElementById('fileInput'), btn = document.getElementById('uploadBtn');
        if(!password || !title || fileInput.files.length === 0) { alert("All fields required!"); return; }
        
        btn.innerText = "Processing Image... ⏳";
        btn.disabled = true;
        
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = async function () {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height, max_size = 1200;
                if (width > height && width > max_size) { height *= max_size / width; width = max_size; }
                else if (height > max_size) { width *= max_size / height; height = max_size; }
                canvas.width = width; canvas.height = height;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                
                btn.innerText = "Uploading... 🚀";
                try {
                    const res = await fetch(`${API_BASE_URL}/photos`, { 
                        method: "POST", 
                        mode: "cors", 
                        headers: { 
                            "Content-Type": "application/json", 
                            "X-Photo-Title": title, 
                            "X-Photo-Category": category, 
                            "X-Admin-Password": password 
                        }, 
                        body: JSON.stringify({ url: compressedBase64 }) 
                    });
                    if(res.ok) { 
                        document.getElementById('titleInput').value = "";
                        fileInput.value = "";
                        toggleMenu(); 
                        loadPhotos(); 
                    } else { alert("Upload failed. Check your admin password."); }
                } catch (err) { alert("Server error connection."); }
                finally {
                    btn.innerText = "Upload Photo";
                    btn.disabled = false;
                }
            };
        };
    }
    async function deletePhoto(url) { const password = prompt("Admin Password:"); if(!password) return; try { const res = await fetch(`${API_BASE_URL}/photos`, { method: "DELETE", mode: "cors", headers: { "Content-Type": "application/json", "X-Admin-Password": password }, body: JSON.stringify({ url }) }); if(res.ok) loadPhotos(); } catch (err) { } }
    loadPhotos();
</script>
</body>
</html>
